<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Avatar Lab · Nova</title>
<link rel="stylesheet" href="hud-theme.css">
<!-- ============================================================
 * AVATAR LAB — local playground for the Nova avatar.
 * Pick colors, try 5 designs, preview idle / thinking / happy,
 * then "Use in Nova" copies the exact CSS for that design.
 * Pure HTML/CSS/JS, no build step. Serve locally and open.
 * ============================================================ -->
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --c1: #3fd9ff;   /* primary / light */
  --c2: #4dd6a8;   /* secondary / glow */
  --c3: #123842;   /* deep / shadow   */
  --bg: #050a0f; --fg: #e6f7fb; --muted: #4a6b78; --line: rgba(63,217,255,.16);
}
html, body { background: var(--bg); }
body { font-family: var(--hud-font); color: var(--fg); min-height: 100vh; }

.shell { max-width: 1080px; margin: 0 auto; padding: 32px 20px 80px; }
header { display: flex; align-items: baseline; gap: 14px; margin-bottom: 6px; flex-wrap: wrap; }
header h1 { font-family: var(--hud-font); font-style: normal; font-weight: 500; font-size: 30px; letter-spacing: 0.04em; color: var(--c1); }
header .role { font-family: var(--hud-font); font-size: 10px; letter-spacing: .12em; color: var(--muted); }
.sub { color: var(--muted); font-size: 13.5px; margin-bottom: 26px; }

/* ---------- control bar ---------- */
.controls { display: flex; flex-wrap: wrap; gap: 22px; align-items: flex-end;
  background: rgba(63,217,255,.03); border: 1px solid var(--line); border-radius: 0; padding: 18px 20px; margin-bottom: 14px; }
.ctl { display: flex; flex-direction: column; gap: 7px; }
.ctl > label { font-family: var(--hud-font); font-size: 9.5px; letter-spacing: .14em; color: var(--muted); }
.swatches { display: flex; gap: 10px; }
.swatch { display: flex; flex-direction: column; align-items: center; gap: 5px; }
.swatch input[type=color] { width: 40px; height: 40px; padding: 0; border: 1px solid var(--line); border-radius: 0; background: none; cursor: pointer; }
.swatch input[type=color]::-webkit-color-swatch-wrapper { padding: 3px; }
.swatch input[type=color]::-webkit-color-swatch { border: none; border-radius: 0; }
.swatch span { font-size: 9px; color: var(--muted); font-family: var(--hud-font); }

.seg { display: inline-flex; border: 1px solid var(--line); border-radius: 0; overflow: hidden; }
.seg button { border: 0; background: transparent; color: var(--muted); padding: 9px 14px; cursor: pointer; font-size: 12.5px; font-weight: 600; font-family: var(--hud-font); }
.seg button.on { background: var(--c1); color: var(--bg); }

.presets { display: flex; flex-wrap: wrap; gap: 8px; }
.preset { border: 1px solid var(--line); border-radius: 0; padding: 6px; cursor: pointer; background: none; display: flex; gap: 0; align-items: center; }
.preset i { width: 16px; height: 16px; border-radius: 50%; display: block; margin: -3px; border: 2px solid var(--bg); }
.preset:hover { border-color: var(--c1); }

.sizebar { display: flex; align-items: center; gap: 10px; }
.sizebar input[type=range] { accent-color: var(--c1); width: 130px; }

/* ---------- gallery ---------- */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 16px; }
.card { position: relative; background: rgba(63,217,255,.025); border: none; border-radius: 0;
  padding: 26px 18px 18px; display: flex; flex-direction: column; align-items: center; gap: 16px; min-height: 230px; transition: background .2s, transform .2s; }
.card::before, .card::after { content: ''; position: absolute; width: 14px; height: 14px; pointer-events: none; transition: border-color .2s; }
.card::before { top: 0; left: 0; border-top: 1px solid var(--line); border-left: 1px solid var(--line); }
.card::after { bottom: 0; right: 0; border-bottom: 1px solid var(--line); border-right: 1px solid var(--line); }
.card:hover { background: rgba(63,217,255,.05); transform: translateY(-2px); }
.card:hover::before { border-color: var(--c1); }
.card:hover::after { border-color: var(--c1); }
.stage { height: 96px; display: flex; align-items: center; justify-content: center; }
.card .name { font-size: 13.5px; font-weight: 600; }
.card .desc { font-size: 11px; color: var(--muted); text-align: center; line-height: 1.4; margin-top: -8px; }
.use { margin-top: auto; border: 1px solid var(--line); background: rgba(63,217,255,.03); color: var(--fg);
  font-size: 12px; font-weight: 600; padding: 9px 0; width: 100%; border-radius: 0; cursor: pointer; transition: .15s; font-family: var(--hud-font); }
.use:hover { background: var(--c1); color: var(--bg); border-color: var(--c1); }
.use.copied { background: var(--c1); color: var(--bg); border-color: var(--c1); }

/* ============================================================
   AVATAR DESIGNS — all driven by --c1 / --c2 / --c3.
   Container <div class="av av--N" data-state="idle|think|happy">
   sized by --s (px). States toggled by data-state on the body.
   ============================================================ */
.av { --s: 64px; width: var(--s); height: var(--s); position: relative; flex-shrink: 0; }

/* 1 · ORB — the original Nova orb (flat fill, no glow) */
.av--orb { border-radius: 50%;
  background: var(--c1);
  animation: floatY 4s ease-in-out infinite; }
.av--orb::before, .av--orb::after { content:''; position:absolute; top:38%; width:14%; height:14%; border-radius:50%;
  background:var(--bg); transition:height .15s; }
.av--orb::before { left:30%; } .av--orb::after { right:30%; }
[data-state=think] .av--orb { animation: floatY 1.1s ease-in-out infinite, glowPulse 1.1s ease-in-out infinite; }
[data-state=happy] .av--orb::before, [data-state=happy] .av--orb::after { height:6%; border-radius:0 0 9px 9px; }

/* 2 · REACTOR — spinning ring segments (border trick, no conic-gradient) round a core */
.av--reactor { display:grid; place-items:center; animation: floatY 4.5s ease-in-out infinite; }
.av--reactor::before { content:''; position:absolute; inset:0; border-radius:50%;
  border: 2px solid transparent; border-top-color: var(--c2); border-right-color: var(--c2);
  animation: spin 6s linear infinite; }
.av--reactor::after { content:''; position:absolute; inset:18%; border-radius:50%;
  border: 2px solid transparent; border-bottom-color: var(--c1); border-left-color: var(--c1);
  animation: spin 3.4s linear infinite reverse; }
.av--reactor i { width:34%; height:34%; border-radius:50%; z-index:1;
  background: var(--c1); }
[data-state=think] .av--reactor::before { animation-duration: 1.6s; }
[data-state=think] .av--reactor::after { animation-duration: 1s; }
[data-state=happy] .av--reactor i { animation: pop .5s ease; }

/* 3 · BLOB — morphing droplet with eyes (flat fill, no glow) */
.av--blob { background: var(--c1);
  border-radius: 42% 58% 60% 40% / 50% 45% 55% 50%;
  animation: morph 6s ease-in-out infinite, floatY 5s ease-in-out infinite; }
.av--blob::before, .av--blob::after { content:''; position:absolute; top:42%; width:13%; height:18%; border-radius:50%;
  background:var(--bg); transition:height .15s; }
.av--blob::before { left:32%; } .av--blob::after { right:32%; }
[data-state=think] .av--blob { animation: morph 1.8s ease-in-out infinite, floatY 1.4s ease-in-out infinite; }
[data-state=happy] .av--blob::before, [data-state=happy] .av--blob::after { height:7%; top:46%; border-radius:0 0 8px 8px; }

/* 4 · BOT — friendly robot head (flat fill, no glow) */
.av--bot { border-radius: 30%;
  background: var(--c1); animation: floatY 4s ease-in-out infinite; }
.av--bot::before { content:''; position:absolute; left:50%; top:-22%; transform:translateX(-50%);
  width:8%; height:24%; background:var(--c2); border-radius:99px; }
.av--bot .face { position:absolute; inset:24% 18%; display:flex; align-items:center; justify-content:space-between; }
.av--bot .face b { width:24%; height:55%; border-radius:99px; background:var(--bg); transition:.15s; animation: blink 4.2s infinite; }
[data-state=think] .av--bot .face b { animation: blink 1.1s infinite; }
[data-state=happy] .av--bot .face b { height:24%; border-radius:0 0 99px 99px; }

/* 5 · PLASMA — rotating radar sweep on a flat disc (no conic-gradient/blur) */
.av--plasma { border-radius:50%; overflow:hidden; isolation:isolate;
  background: var(--c2);
  animation: floatY 4.5s ease-in-out infinite; }
.av--plasma::before { content:''; position:absolute; inset:0; border-radius:50%;
  border: 1px solid var(--c1); }
.av--plasma::after { content:''; position:absolute; left:50%; top:50%; width:2px; height:48%;
  background: var(--c1); transform-origin: top; transform: translateX(-50%) rotate(0deg);
  animation: spin 7s linear infinite; }
[data-state=think] .av--plasma::after { animation-duration: 1.8s; }
[data-state=happy] .av--plasma { animation: floatY 4.5s ease-in-out infinite, pop .5s ease; }

/* ---------- shared keyframes ---------- */
@keyframes floatY { 0%,100%{ transform: translateY(0) } 50%{ transform: translateY(-7px) } }
@keyframes glowPulse { 0%,100%{ opacity: 1 } 50%{ opacity: .6 } }
@keyframes spin { to { transform: rotate(360deg) } }
@keyframes morph {
  0%,100%{ border-radius: 42% 58% 60% 40% / 50% 45% 55% 50% }
  33%{ border-radius: 60% 40% 45% 55% / 55% 55% 45% 45% }
  66%{ border-radius: 45% 55% 55% 45% / 42% 58% 42% 58% } }
@keyframes blink { 0%,92%,100%{ transform: scaleY(1) } 96%{ transform: scaleY(.1) } }
@keyframes pop { 0%{ transform: scale(1) } 40%{ transform: scale(1.18) } 100%{ transform: scale(1) } }

.toast { position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%) translateY(20px);
  background: var(--c1); color: var(--bg); font-weight: 700; font-size: 13px; padding: 11px 20px; border-radius: 0;
  opacity: 0; pointer-events: none; transition: .25s; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (max-width: 560px){ .controls { gap: 16px; } }
</style>
</head>
<body class="hud-grid" data-state="idle">
  <div class="shell">
    <header>
      <h1>Avatar Lab</h1><span class="role">Nova design playground</span>
      <span class="hud-status"><span class="hud-status-dot"></span><span>system online</span></span>
    </header>
    <p class="sub">Tweak the colors, watch all five designs react. Toggle the state to preview thinking & happy. Hit <b>Use in Nova</b> to copy that design's CSS.</p>

    <div class="controls">
      <div class="ctl">
        <label>Colors</label>
        <div class="swatches">
          <div class="swatch"><input id="c1" type="color" value="#3fd9ff"><span>light</span></div>
          <div class="swatch"><input id="c2" type="color" value="#4dd6a8"><span>glow</span></div>
          <div class="swatch"><input id="c3" type="color" value="#123842"><span>deep</span></div>
        </div>
      </div>

      <div class="ctl">
        <label>Palettes</label>
        <div class="presets" id="presets"></div>
      </div>

      <div class="ctl">
        <label>State</label>
        <div class="seg" id="stateSeg">
          <button data-state="idle" class="on">Idle</button>
          <button data-state="think">Thinking</button>
          <button data-state="happy">Happy</button>
        </div>
      </div>

      <div class="ctl">
        <label>Size</label>
        <div class="sizebar"><input id="size" type="range" min="44" max="120" value="64"><span id="sizeVal" style="font-size:12px;color:var(--muted);font-family:ui-monospace,monospace">64px</span></div>
      </div>
    </div>

    <div class="grid" id="grid"></div>
  </div>

  <div class="toast" id="toast">Copied!</div>

<script>
(function(){
  const root = document.documentElement;
  const body = document.body;

  const DESIGNS = [
    { id:'orb',     name:'Orb',     desc:'Glossy sphere with eyes — the original Nova.', html:'' },
    { id:'reactor', name:'Reactor', desc:'Spinning energy rings around a bright core.',   html:'<i></i>' },
    { id:'blob',    name:'Blob',    desc:'Soft morphing droplet, playful and alive.',     html:'' },
    { id:'bot',     name:'Bot',     desc:'Friendly robot head with a blinking face.',     html:'<div class="face"><b></b><b></b></div>' },
    { id:'plasma',  name:'Plasma',  desc:'Glassy orb of swirling conic plasma.',          html:'' },
  ];

  const PALETTES = [
    { c1:'#3fd9ff', c2:'#4dd6a8', c3:'#123842' }, // hud cyan (default)
    { c1:'#A78BFA', c2:'#F0ABFC', c3:'#5B21B6' }, // violet
    { c1:'#FDBA74', c2:'#FCA5A5', c3:'#9A3412' }, // sunset
    { c1:'#7DD3FC', c2:'#A5B4FC', c3:'#1E3A8A' }, // ocean
    { c1:'#FDE68A', c2:'#FCD34D', c3:'#B45309' }, // gold
    { c1:'#F9A8D4', c2:'#F0ABFC', c3:'#9D174D' }, // bubblegum
    { c1:'#86EFAC', c2:'#5EEAD4', c3:'#065F46' }, // emerald
    { c1:'#E5E7EB', c2:'#94A3B8', c3:'#334155' }, // graphite
  ];

  // build gallery
  const grid = document.getElementById('grid');
  DESIGNS.forEach(d => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML =
      '<div class="stage"><div class="av av--'+d.id+'">'+d.html+'</div></div>' +
      '<div class="name">'+d.name+'</div>' +
      '<div class="desc">'+d.desc+'</div>' +
      '<button class="use" data-id="'+d.id+'">Use in Nova</button>';
    grid.appendChild(card);
  });

  // build palette chips
  const presets = document.getElementById('presets');
  PALETTES.forEach(p => {
    const b = document.createElement('button');
    b.className = 'preset'; b.title = 'Apply palette';
    b.innerHTML = '<i style="background:'+p.c1+'"></i><i style="background:'+p.c2+'"></i><i style="background:'+p.c3+'"></i>';
    b.addEventListener('click', () => applyPalette(p));
    presets.appendChild(b);
  });

  // colors
  const c1 = document.getElementById('c1'), c2 = document.getElementById('c2'), c3 = document.getElementById('c3');
  function syncColors(){ root.style.setProperty('--c1', c1.value); root.style.setProperty('--c2', c2.value); root.style.setProperty('--c3', c3.value); }
  [c1,c2,c3].forEach(el => el.addEventListener('input', syncColors));
  function applyPalette(p){ c1.value=p.c1; c2.value=p.c2; c3.value=p.c3; syncColors(); }
  syncColors();

  // size
  const size = document.getElementById('size'), sizeVal = document.getElementById('sizeVal');
  function syncSize(){ document.querySelectorAll('.av').forEach(a => a.style.setProperty('--s', size.value+'px')); sizeVal.textContent = size.value+'px'; }
  size.addEventListener('input', syncSize); syncSize();

  // state
  document.getElementById('stateSeg').addEventListener('click', e => {
    const btn = e.target.closest('button'); if (!btn) return;
    body.dataset.state = btn.dataset.state;
    document.querySelectorAll('#stateSeg button').forEach(b => b.classList.toggle('on', b === btn));
  });

  // ---- "Use in Nova": copy the chosen design's CSS, ready to paste ----
  const toast = document.getElementById('toast');
  function showToast(msg){ toast.textContent = msg; toast.classList.add('show'); setTimeout(()=>toast.classList.remove('show'), 1600); }

  function cssFor(id){
    const vars = `:root{\n  --c1: ${c1.value};\n  --c2: ${c2.value};\n  --c3: ${c3.value};\n}`;
    const sheet = document.styleSheets[0];
    const want = ['.av ', '.av--'+id, '@keyframes floatY','@keyframes glowPulse','@keyframes spin','@keyframes morph','@keyframes blink','@keyframes pop'];
    const rules = [];
    for (const r of sheet.cssRules){
      const t = r.cssText;
      if (t.startsWith('.av{') || t.startsWith('.av ')) { rules.push(t); continue; }
      if (t.includes('.av--'+id)) { rules.push(t); continue; }
      if (t.startsWith('@keyframes')) { rules.push(t); continue; }
    }
    return `/* Nova avatar · "${id}" design — paste into your stylesheet */\n${vars}\n\n` + rules.join('\n') +
      `\n\n<!-- markup -->\n<div class="av av--${id}" data-state="idle">${DESIGNS.find(d=>d.id===id).html}</div>`;
  }

  grid.addEventListener('click', async e => {
    const btn = e.target.closest('.use'); if (!btn) return;
    const css = cssFor(btn.dataset.id);
    try { await navigator.clipboard.writeText(css); } catch(_){
      const ta = document.createElement('textarea'); ta.value = css; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();
    }
    btn.classList.add('copied'); btn.textContent = '✓ Copied CSS';
    setTimeout(()=>{ btn.classList.remove('copied'); btn.textContent = 'Use in Nova'; }, 1500);
    showToast(btn.dataset.id + ' CSS copied');
  });
})();
</script>
</body>
</html>
